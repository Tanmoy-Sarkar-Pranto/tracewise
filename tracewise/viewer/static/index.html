<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TraceWise</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: monospace; display: flex; height: 100vh; overflow: hidden; background: #0d1117; color: #c9d1d9; }
    #sidebar { width: 340px; border-right: 1px solid #30363d; overflow-y: auto; flex-shrink: 0; }
    #sidebar h1 { padding: 12px 16px; font-size: 14px; border-bottom: 1px solid #30363d; color: #58a6ff; }
    #trace-list { list-style: none; }
    #trace-list li { padding: 10px 16px; border-bottom: 1px solid #21262d; cursor: pointer; font-size: 12px; }
    #trace-list li:hover { background: #161b22; }
    #trace-list li.active { background: #1f2937; border-left: 3px solid #58a6ff; }
    .trace-name { font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .trace-meta { color: #8b949e; margin-top: 3px; }
    .status-OK { color: #3fb950; }
    .status-ERROR { color: #f85149; }
    .status-UNSET { color: #8b949e; }
    #detail { flex: 1; overflow-y: auto; padding: 20px; }
    #detail h2 { font-size: 13px; color: #8b949e; margin-bottom: 16px; }
    .span-node { margin-left: 20px; margin-bottom: 4px; }
    .span-row { display: flex; align-items: baseline; gap: 8px; padding: 4px 8px; border-radius: 4px; font-size: 12px; cursor: pointer; }
    .span-row:hover { background: #161b22; }
    .span-row.root { margin-left: 0; }
    .span-name { font-weight: bold; }
    .span-duration { color: #8b949e; }
    .span-attrs { font-size: 11px; color: #6e7681; margin: 4px 0 4px 28px; display: none; }
    .span-attrs.open { display: block; }
    #empty { padding: 40px; color: #8b949e; text-align: center; }
    #refresh { float: right; background: none; border: 1px solid #30363d; color: #8b949e; padding: 4px 10px; cursor: pointer; border-radius: 4px; font-size: 11px; }
    #refresh:hover { border-color: #58a6ff; color: #58a6ff; }
    #clear-btn { display: block; width: 100%; padding: 10px 16px; background: none; border: none; border-top: 1px solid #30363d; color: #f85149; cursor: pointer; font-family: monospace; font-size: 12px; text-align: left; }
    #clear-btn:hover { background: #161b22; }
  </style>
</head>
<body>
  <div id="sidebar">
    <h1>TraceWise <button id="refresh">↻ refresh</button></h1>
    <ul id="trace-list"></ul>
    <button id="clear-btn">✕ clear all traces</button>
  </div>
  <div id="detail">
    <div id="empty">Select a trace to inspect it.</div>
  </div>
  <script src="app.js"></script>
</body>
</html>
